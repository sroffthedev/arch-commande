<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161d;
    --surface2: #1a1e28;
    --border: #252a38;
    --accent: #ff00ff;
    --accent2: #00ffff;
    --garuda: #ff003c;
    --green: #39d353;
    --yellow: #e3b341;
    --red: #f85149;
    --purple: #bc8cff;
    --text: #e6edf3;
    --muted: #7d8590;
    --code-bg: #161b22;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid removed for simplicity */

  /* Header */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  header h1 {
    font-size: 1rem;
    font-weight: 800;
    background: linear-gradient(135deg, #fff 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    white-space: nowrap;
  }

  header p, .logo-row, .badge-row { display: none; }

  .search-wrap {
    flex-grow: 1;
    margin: 0;
    padding: 0;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px 6px 32px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    outline: none;
  }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 0.8rem;
    pointer-events: none;
  }

  /* Layout */
  main {
    padding: 16px 12px 40px;
  }

  /* Section */
  .section {
    margin-bottom: 24px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .section-count {
    font-size: 0.65rem;
    color: var(--muted);
  }

  /* Cards grid */
  .cards {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
  }

  .card-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .cmd-emoji { font-size: 0.9rem; }
  .cmd-label { font-size: 0.8rem; font-weight: 700; }
  .cmd-desc { font-size: 0.7rem; color: var(--muted); margin-bottom: 6px; line-height: 1.3; }

  .tags { display: none; }

  .code-block {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 35px 6px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: #c9d1d9;
    line-height: 1.4;
    position: relative;
    white-space: pre;
    overflow-x: auto;
  }

  .code-block .prompt {
    color: var(--green);
    user-select: none;
    margin-right: 5px;
  }

  .code-block .sudo-kw { color: var(--yellow); }
  .code-block .cmd-name { color: var(--accent2); }
  .code-block .flag { color: var(--purple); }
  .code-block .arg { color: #ffa657; }

  .copy-btn {
    position: absolute;
    top: 5px;
    right: 5px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-size: 0.6rem;
    font-family: 'JetBrains Mono', monospace;
    padding: 1px 5px;
    cursor: pointer;
  }

  .copy-btn.copied {
    color: var(--green);
    border-color: var(--green);
  }

  /* No results */
  .no-results {
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    display: none;
  }

  /* Footer */
  footer {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 24px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
  }

  footer span { color: var(--accent); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* Responsive */
  @media (max-width: 600px) {
    .cards { grid-template-columns: 1fr; }
    header h1 { font-size: 1.8rem; }
  }
</style>
</head>

function renderCode(cmd) {
  if (!cmd.highlight) {
    return cmd.code.split('\n').map(line =>
      `<span class="prompt">$</span>${escHtml(line)}`
    ).join('\n');
  }
  let out = `<span class="prompt">$</span>`;
  for (const part of cmd.highlight) {
    out += part.cls
      ? `<span class="${part.cls}">${escHtml(part.text)}</span>`
      : escHtml(part.text);
  }
  return out;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildUI(filter = '') {
  const main = document.getElementById('main');
  const noRes = document.getElementById('noResults');
  const q = filter.toLowerCase().trim();
  let totalVisible = 0;

  main.innerHTML = '';

  data.forEach((section, si) => {
    const visible = section.commands.filter(cmd =>
      !q ||
      cmd.label.toLowerCase().includes(q) ||
      cmd.desc.toLowerCase().includes(q) ||
      cmd.code.toLowerCase().includes(q) ||
      cmd.tags.some(t => t.includes(q)) ||
      section.section.toLowerCase().includes(q)
    );
    if (!visible.length) return;
    totalVisible += visible.length;

    const sec = document.createElement('div');
    sec.className = 'section';
    sec.style.animationDelay = `${si * 0.05}s`;

    sec.innerHTML = `
      <div class="section-header">
        <span class="section-title">${section.section}</span>
        <span class="section-count">${visible.length} commande${visible.length > 1 ? 's' : ''}</span>
      </div>
      <div class="cards" id="cards-${si}"></div>
    `;
    main.appendChild(sec);

    const grid = sec.querySelector(`#cards-${si}`);

    visible.forEach((cmd, ci) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.setProperty('--card-accent', section.accent);
      card.style.animationDelay = `${(si * 0.05) + (ci * 0.04)}s`;

      card.innerHTML = `
        <div class="card-top">
          <span class="cmd-emoji">${cmd.emoji}</span>
          <span class="cmd-label">${cmd.label}</span>
        </div>
        <p class="cmd-desc">${cmd.desc}</p>
        <div class="code-block"><button class="copy-btn" data-code="${escHtml(cmd.code)}">copy</button>${renderCode(cmd)}</div>
        <div class="tags">${cmd.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      `;
      grid.appendChild(card);
    });
  });

  if (totalVisible === 0) {
    noRes.style.display = 'block';
    main.style.display = 'none';
  } else {
    noRes.style.display = 'none';
    main.style.display = '';
  }
}

// Copy buttons
document.addEventListener('click', e => {
  if (e.target.classList.contains('copy-btn')) {
    const code = e.target.dataset.code;
    navigator.clipboard.writeText(code).then(() => {
      e.target.textContent = '✓';
      e.target.classList.add('copied');
      setTimeout(() => {
        e.target.textContent = 'copy';
        e.target.classList.remove('copied');
      }, 1500);
    });
  }
});

// Search
const searchEl = document.getElementById('search');
let debounce;
searchEl.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(() => buildUI(searchEl.value), 120);
});

// Initial Render
buildUI();
